version: "3.9"

services:
  backend:
    build: ./backend
    container_name: nova_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8002:8000"
    volumes:
      - nova_data:/app/data
      - ${MEDIA_PATH}:/media:ro  # Gebruik het pad uit .env
      - ${MEDIA_PATH}:${MEDIA_PATH}:ro  # Nodig voor absolute symlinks (decypharr_symlinks -> /docker/dumbarr/...)

  frontend:
    build: ./frontend
    container_name: nova_frontend
    restart: unless-stopped
    ports:
      - "8001:5173"
    depends_on:
      - backend

volumes:
  nova_data:
